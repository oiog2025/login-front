<div class="login-container">
  <h2>Iniciar Sesión</h2>

  <form (ngSubmit)="onSubmit()" [formGroup]="loginForm">

    <div class="form-group">
      <label for="email">Correo Electrónico</label>
      <input
        formControlName="email"
        id="email"
        placeholder="ejemplo@correo.com"
        type="email"
      >
      @if (loginForm.get('email')?.touched && loginForm.get('email')?.invalid) {
        <span class="error">
            Ingresa un correo válido.
          </span>
      }
    </div>

    <div class="form-group">
      <label for="password">Contraseña</label>
      <input
        formControlName="password"
        id="password"
        placeholder="********"
        type="password"
      >
    </div>

    <button [disabled]="loginForm.invalid || isLoading()" type="submit">
      {{ isLoading() ? 'Cargando...' : 'Entrar' }}
    </button>

    <div class="register-link" style="margin-top: 15px; text-align: center;">
      <p>¿No tienes una cuenta? <a routerLink="/register">Regístrate aquí</a></p>
    </div>

    <div class="notification-container">
      @if (errorMessage()) {
        <div class="toast-notification error-toast">
          <span class="icon">❌</span>
          <div class="message-content">
            <strong>Error de Autenticación</strong>
            <p>{{ errorMessage() }}</p>
          </div>
          <button (click)="errorMessage.set(null)" class="close-btn" type="button">&times;</button>
        </div>
      }

      @if (successMessage()) {
        <div class="toast-notification success-toast">
          <span class="icon">✅</span>
          <div class="message-content">
            <strong>¡Excelente!</strong>
            <p>{{ successMessage() }}</p>
          </div>
          <button (click)="successMessage.set(null)" class="close-btn" type="button">&times;</button>
        </div>
      }
    </div>

  </form>
</div>
